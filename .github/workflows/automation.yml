name: Daily Automation Run

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Install Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Run Automation Script
      run: mvn clean compile exec:java

    - name: Find HTML Report
      id: find-report
      run: |
        # Find the latest generated HTML report
        REPORT_PATH=$(find reports/html -name "test_report.html" -type f | sort -n | tail -1)
        echo "report_path=$REPORT_PATH" >> $GITHUB_OUTPUT

    - name: Upload Report as Artifact
      uses: actions/upload-artifact@v4
      if: always() # Run even if script fails
      with:
        name: Automation-Report
        path: reports/

    - name: Send Email with Report
      uses: dawidd6/action-send-mail@v3
      if: always() # Run even if script fails
      with:
        # Required mail server address
        server_address: smtp.gmail.com
        # Required mail server port
        server_port: 465
        # Optional whether this connection use TLS (default is true if server_port is 465)
        secure: true
        # Required credentials for sending email
        # Store these in GitHub Repository Secrets!
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        # Required subject
        subject: Mcfeels Automation Daily Report
        # Required recipients' addresses (comma separated)
        to: deepak.maheshwari@exinent.com
        # Required sender full name (address can be skipped)
        from: Mcfeels Automation Bot
        # Optional plain body
        body: |
          Hello,
          
          The daily Mcfeels automation run has completed.
          Please find the attached HTML report for the detailed results.
          
          Regards,
          Automation Bot
        # Optional attachments (comma separated)
        attachments: ${{ steps.find-report.outputs.report_path }}